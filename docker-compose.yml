# GPU (default):  docker compose up --build
# CPU only:       docker compose -f docker-compose.yml -f docker-compose.cpu.yml up --build
# Model download: docker compose run --rm downloader
# ────────────────────────────────────────────────────────────────────
services:
  colabwis:
    build: .
    image: colabwis:latest
    container_name: colabwis
    security_opt:
      - seccomp=unconfined
    ports:
      - "8000:8000"
    volumes:
      # Persist downloaded models across rebuilds
      - model_data:/app/model_local
    environment:
      - HF_TOKEN=${HF_TOKEN:-}
    # GPU
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped

  # Helper: one-shot container to download models
  downloader:
    image: colabwis:latest
    container_name: colabwis-downloader
    volumes:
      - model_data:/app/model_local
    environment:
      - HF_TOKEN=${HF_TOKEN:-}
    entrypoint: ["python", "/app/model_downloader.py"]

volumes:
  model_data:
